# Configuration de l'infrastructure (adaptateurs). Le coeur metier ignore ce fichier.
spring:
  application:
    name: canicule

  # Base de donnees en memoire H2 : aucune installation, repartie a chaque demarrage.
  datasource:
    url: jdbc:h2:mem:canicule;DB_CLOSE_DELAY=-1
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop   # cree le schema au demarrage (pratique pour une demo)
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # Console H2 accessible sur http://localhost:8080/h2-console (jdbc url ci-dessus)
  h2:
    console:
      enabled: true

server:
  port: 8080

# Journalisation lisible pour suivre les alertes canicule dans la console.
logging:
  level:
    fr.meteo: INFO
